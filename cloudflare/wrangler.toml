# operation.tw — Cloudflare Worker 設定
# 部署：cd cloudflare && wrangler deploy
name = "operation-tw-api"
main = "worker.js"
compatibility_date = "2024-09-23"

# D1 資料庫綁定（建立後把 database_id 填進來）
#   wrangler d1 create operation-tw
[[d1_databases]]
binding = "DB"
database_name = "operation-tw"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# 路由（建議同網域，與前端同源 → 無 CORS、Access cookie 自動帶上）
# 需求：operation.tw 的 DNS 在 Cloudflare 上（橙雲代理）。
# operation.tw/api/* 交給這個 Worker，其餘路徑仍回 GitHub Pages。
[[routes]]
pattern = "operation.tw/api/*"
zone_name = "operation.tw"

# 替代方案：獨立子網域（需另設 CORS / Access / CSP）
# [[routes]]
# pattern = "api.operation.tw"
# custom_domain = true

# 非機密設定（機密一律用 wrangler secret put，勿寫在這裡）
[vars]
ALLOWED_ORIGINS = "https://operation.tw,https://www.operation.tw"
ADMIN_EMAILS = "awsjin510@gmail.com,keepfighting510@gmail.com"
ACCESS_TEAM_DOMAIN = "REPLACE.cloudflareaccess.com"
ACCESS_AUD = "REPLACE_WITH_ACCESS_APPLICATION_AUD"

# 機密（用指令設定，不要寫在檔案）：
#   wrangler secret put SERVICE_TOKEN     # 給 GitHub Actions 用的長隨機字串
