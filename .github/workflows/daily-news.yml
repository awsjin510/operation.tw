name: Daily News Auto-Post

on:
  schedule:
    # 每天 08:25 台灣時間（= 00:25 UTC）。Podcast 早上 07:00 上架後約 1.5 小時跑，
    # 預留 RSS 更新緩衝；用非整點時間避開 GitHub 排程的整點壅塞延遲。
    - cron: '25 0 * * *'
  workflow_dispatch:        # 允許手動觸發，方便測試

permissions:
  contents: write           # 需要寫入權限以 commit sitemap/feed
  issues: write             # 需要建立 issue 以通知 CI 失敗

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Run auto-post script
        # 部落格自動發文（依賴 Supabase / Anthropic）與 Podcast 更新互相獨立。
        # 即使這步因 Supabase 暫時性錯誤（例如 500）失敗，也不該擋下後續的
        # podcast/sitemap/feed 產生與 commit，否則 episodes.json 會停止更新。
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node auto-post.js
        working-directory: scripts

      - name: Generate sitemap and RSS feed
        # 同樣設為 continue-on-error：sitemap 產生失敗不該擋下後面的
        # episodes.json 更新與 commit，否則新單集會無法進到首頁聚光燈。
        continue-on-error: true
        run: node generate-sitemap.js
        working-directory: scripts

      - name: Generate podcast episodes JSON
        run: node generate-podcast.js
        working-directory: scripts
        continue-on-error: true

      - name: Generate articles from new podcast episodes
        # 偵測 Podcast 新單集 → 用 Claude 延伸成文章並發布。
        # 與其他步驟獨立，失敗不應擋下 commit。
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node podcast-to-post.js
        working-directory: scripts
        continue-on-error: true

      - name: Build static article pages (SEO)
        # 由最新的 posts.json 產生每篇 /post/{id}/index.html（含 meta/JSON-LD + 完整內文），
        # 並刷新 sitemap.xml、feed.xml、llms.txt、index.html。
        # 需要 Supabase 金鑰以把文章完整內文烤進靜態頁（供搜尋引擎 / AI 爬蟲索引）。
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node build-static.js
        working-directory: scripts
        continue-on-error: true

      - name: Commit and push sitemap/feed/posts updates
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml feed.xml posts.json images/ episodes.json post/ category/ llms.txt index.html
          [ -f podcast-posts.json ] && git add podcast-posts.json || true
          if git diff --cached --quiet; then
            echo "No changes to sitemap/feed/posts/episodes"
          else
            git commit -m "chore: update sitemap.xml, feed.xml, posts.json and episodes.json"
            # Push with retry (3 attempts, exponential backoff)
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                echo "Push succeeded on attempt $i"
                break
              fi
              if [ "$i" -eq 3 ]; then
                echo "Push failed after 3 attempts"
                exit 1
              fi
              echo "Push failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[CI] Daily News workflow failed — ${new Date().toISOString().split('T')[0]}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'ci-failure', per_page: 5
            });
            if (existing.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, labels: ['ci-failure'],
              body: `Workflow **${context.workflow}** failed.\n\n[View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
