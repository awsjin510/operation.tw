name: Podcast Backfill

# 手動補寫舊單集：把尚未產文的 Podcast 舊單集，用 Claude 延伸成文章並發布。
# 內部分批迴圈：一次觸發會自動分批生成、每批 commit/push，直到全部補完
# （以 podcast-posts.json 去重；每批先推上去，崩潰也不會掉資料）。
on:
  workflow_dispatch:
    inputs:
      model:
        description: '生成模型'
        required: true
        default: 'claude-sonnet-4-6'
        type: choice
        options:
          - claude-sonnet-4-6
          - claude-haiku-4-5-20251001
      batch_size:
        description: '每批生成幾篇（每批會 commit/push 一次）'
        required: true
        default: '10'
      max_batches:
        description: '最多跑幾批（batch_size × max_batches 要 ≥ 想補的總數）'
        required: true
        default: '20'
      cleanup_ids:
        description: '（選填）先刪除這些 Supabase 文章 ID，逗號分隔，用於清掉失敗留下的孤兒。'
        required: false
        default: ''
      retag:
        description: '（選填）改分類，格式 id:分類,id:分類，例如 153:成長,156:成長'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 320
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Cleanup orphaned posts (optional)
        if: ${{ github.event.inputs.cleanup_ids != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ids="${{ github.event.inputs.cleanup_ids }}"
          echo "🗑  刪除 Supabase 孤兒文章 id in ($ids)"
          code=$(curl -sS -o /tmp/del.txt -w '%{http_code}' -X DELETE \
            "$SUPABASE_URL/rest/v1/posts?id=in.($ids)" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Prefer: return=minimal")
          echo "HTTP $code"
          if [ "$code" -ge 300 ]; then cat /tmp/del.txt; exit 1; fi
          echo "✓ 清除完成"

      - name: Retag categories (optional)
        if: ${{ github.event.inputs.retag != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          IFS=',' read -ra PAIRS <<< "${{ github.event.inputs.retag }}"
          for pair in "${PAIRS[@]}"; do
            id="${pair%%:*}"; cat="${pair##*:}"
            echo "🏷  retag id=$id → $cat"
            code=$(curl -sS -o /tmp/patch.txt -w '%{http_code}' -X PATCH \
              "$SUPABASE_URL/rest/v1/posts?id=eq.$id" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              --data "{\"category\":\"$cat\"}")
            echo "HTTP $code"
            if [ "$code" -ge 300 ]; then cat /tmp/patch.txt; exit 1; fi
          done
          echo "✓ 分類更新完成"

      - name: Backfill all remaining episodes (batched, push each batch)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKFILL: '1'
          PODCAST_MODEL: ${{ github.event.inputs.model }}
          MAX_PER_RUN: ${{ github.event.inputs.batch_size }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MAXB="${{ github.event.inputs.max_batches }}"
          noprogress=0
          for i in $(seq 1 "$MAXB"); do
            echo "════════════ Batch $i/$MAXB ════════════"
            # 生成一批（模組路徑以 __dirname 為基準，從 repo 根目錄呼叫沒問題）
            OUT=$(node scripts/podcast-to-post.js 2>&1) || true
            echo "$OUT"
            # 真的沒有待處理單集 → 全部補完，乾淨結束
            if echo "$OUT" | grep -q "沒有待處理單集"; then
              echo "✅ 已沒有待處理單集，全部補完。"
              break
            fi
            # 這批沒有實際產出（暫時性錯誤／API 額度不足等）→ 不 commit，稍等重試
            if ! echo "$OUT" | grep -qE "本次生成 [1-9]"; then
              noprogress=$((noprogress + 1))
              echo "⚠ 本批 0 產出（連續第 $noprogress 次）。可能是暫時性錯誤或 API 額度不足。"
              if [ "$noprogress" -ge 3 ]; then
                echo "❌ 連續 3 批沒有進度，判定卡住（多半是 Anthropic 額度用盡或持續性錯誤），標記失敗結束。"
                exit 1
              fi
              sleep 15
              continue
            fi
            noprogress=0
            # 安全網：以 Supabase 為準重建 posts.json，再產靜態頁（失敗都不致命）
            node scripts/sync-posts-json.js 2>&1 || echo "(sync 失敗，沿用上一步的 posts.json)"
            node scripts/build-static.js 2>&1 || echo "(build 失敗，略過)"
            git add posts.json images/ post/ sitemap.xml feed.xml llms.txt index.html
            [ -f podcast-posts.json ] && git add podcast-posts.json || true
            if git diff --cached --quiet; then
              echo "本批無檔案變更，繼續。"
              continue
            fi
            git commit -m "chore(podcast): backfill batch $i"
            pushed=0
            for r in 1 2 3; do
              if git pull --rebase origin main && git push; then pushed=1; break; fi
              echo "push 失敗，$((r * 3))s 後重試…"; sleep $((r * 3))
            done
            [ "$pushed" = "1" ] || { echo "push 連續失敗"; exit 1; }
          done
          echo "🎉 全部批次結束"
