name: Podcast Update Titles

# 手動：把 Podcast 生成文章的標題前面補上對應 EP 集數碼（EP54｜… / AI33｜…）。
# 預設 dry_run=true 只預覽不寫入；確認對應正確後再以 dry_run=false 正式套用。
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只預覽不寫入（true）／正式套用（false）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  update-titles:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Update titles with EP codes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: node update-podcast-titles.js
        working-directory: scripts

      - name: Rebuild posts.json + static pages and commit
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node scripts/sync-posts-json.js || echo "(sync 失敗)"
          node scripts/build-static.js || echo "(build 失敗)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json post/ sitemap.xml feed.xml llms.txt index.html
          if git diff --cached --quiet; then
            echo "無變更"
          else
            git commit -m "chore(podcast): prefix article titles with EP codes"
            for r in 1 2 3; do
              if git pull --rebase origin main && git push; then break; fi
              echo "push 失敗，重試…"; sleep $((r * 3))
            done
          fi
